# nome da pipeline
name: Run Basic Testes

# em que momento será executada 
on:
  pull_request:
    braches: [master]

jobs: 
  # o que vai ser feito nessa pipeline
  # só teremos um job: rodar testes 

  cypress-run:
#maquina que será executado
    runs on: windowns-latest

# passo a passo para rodar os testes
    steps:
    # clone do projeto
      - name: Checkout/Clone do projeto
        uses: actions/checkout@v6
    # exemplo de execução no terminal
      - name: instalar dependencias do projeto
        run: echo Eduardo Finotti
    # execução e config do projeto  
      - name: Run Testes
        uses: cypress-io/github-action@v7
        with: 
          record: true
        env:
          CYPRESS_RECORD_KEY: ${{  secrets.CYPRESS_RECORD_KEY  }} 

