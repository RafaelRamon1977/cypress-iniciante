# nome da pipeline
name: Run Basic Testes


# em que momento será executada
on:
   pull_request: 
     branches: [master]

jobs: 
   # o que vai ser feito ness pipeline
   # só teremos um job: rodar os testes 
  cypress-run:
    # mquina que será executada
    runs-on:  windows-latest

    # passo a passo para rodar os testes    
    steps: 
        #CLONE DO PROJETO
        - name: Checkout/clone do projeto
          uses: actions/checkout@v6 
         
          # EXEMPLO DE EXECUÇÃO NO TERMINAL
        - name: instalar dependencias do projeto
          run: echo Eduardo Finotti

         # execução e confuguração do projeto   
        - name: Run Testes
          uses: cypress-io/github-action@v7
          with:
            record: true
          env:
            CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }} 
